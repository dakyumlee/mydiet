spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  web:
    resources:
      static-locations: classpath:/static/
  
  logging:
    level:
      com: DEBUG
      org.springframework.web: DEBUG

server:
  port: 8080

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}
    
# 관리자 설정
admin:
  username: admin
  password: admin123
  
# 애플리케이션 설정
app:
  name: MyDiet
  version: 1.0.0