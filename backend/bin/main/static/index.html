<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mydiet - 로그인</title>
    <style>
        @font-face {
            font-family: 'S-CoreDream-3Light';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-3Light.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'S-CoreDream-3Light', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .signup-extra {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .signup-extra .form-group {
            margin-bottom: 15px;
        }

        .emotion-mode {
            grid-column: 1 / -1;
        }

        .emotion-mode select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .emotion-mode select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #28a745;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>🍽️ mydiet</h1>
            <p>AI와 함께하는 스마트 다이어트 관리</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginEmail">이메일</label>
                <input type="email" id="loginEmail" name="email" required>
                <div class="error-message" id="loginEmailError"></div>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">비밀번호</label>
                <input type="password" id="loginPassword" name="password" required>
                <div class="error-message" id="loginPasswordError"></div>
            </div>

            <button type="submit" class="btn btn-primary">로그인</button>
            
            <div class="toggle-form">
                계정이 없으신가요? <a href="#" id="showSignup">회원가입</a>
            </div>
        </form>

        <form id="signupForm" class="auth-form hidden">
            <div class="form-group">
                <label for="signupEmail">이메일</label>
                <input type="email" id="signupEmail" name="email" required>
                <div class="error-message" id="signupEmailError"></div>
            </div>
            
            <div class="form-group">
                <label for="signupPassword">비밀번호</label>
                <input type="password" id="signupPassword" name="password" required>
                <div class="error-message" id="signupPasswordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <div class="error-message" id="confirmPasswordError"></div>
            </div>

            <div class="signup-extra">
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" required>
                    <div class="error-message" id="nicknameError"></div>
                </div>

                <div class="form-group">
                    <label for="weightGoal">목표 체중 (kg)</label>
                    <input type="number" id="weightGoal" name="weightGoal" step="0.1" required>
                    <div class="error-message" id="weightGoalError"></div>
                </div>

                <div class="form-group emotion-mode">
                    <label for="emotionMode">AI 코칭 스타일</label>
                    <select id="emotionMode" name="emotionMode" required>
                        <option value="">선택하세요</option>
                        <option value="무자비">무자비 (강하게 푸쉬)</option>
                        <option value="츤데레">츤데레 (까칠하지만 따뜻한)</option>
                        <option value="다정함">다정함 (부드럽고 격려하는)</option>
                        <option value="유머">유머 (재미있게 동기부여)</option>
                    </select>
                    <div class="error-message" id="emotionModeError"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">회원가입</button>
            
            <div class="toggle-form">
                이미 계정이 있으신가요? <a href="#" id="showLogin">로그인</a>
            </div>
        </form>
        
        <div class="success-message" id="successMessage"></div>
    </div>

    <script>
        document.getElementById('showSignup').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            clearErrors();
        });

        document.getElementById('showLogin').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearErrors();
        });

        function clearErrors() {
            const errorMessages = document.querySelectorAll('.error-message, .success-message');
            errorMessages.forEach(msg => {
                msg.style.display = 'none';
                msg.textContent = '';
            });
        }

        function showError(fieldId, message) {
            const errorElement = document.getElementById(fieldId + 'Error');
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }

        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();

            const formData = new FormData(this);
            const loginData = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('userId', result.userId);
                    localStorage.setItem('userInfo', JSON.stringify(result));
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    showError('loginEmail', error.message || '로그인에 실패했습니다.');
                }
            } catch (error) {
                showError('loginEmail', '서버 연결에 실패했습니다.');
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();

            const formData = new FormData(this);
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');

            if (password !== confirmPassword) {
                showError('confirmPassword', '비밀번호가 일치하지 않습니다.');
                return;
            }

            const signupData = {
                email: formData.get('email'),
                password: password,
                nickname: formData.get('nickname'),
                weightGoal: parseFloat(formData.get('weightGoal')),
                emotionMode: formData.get('emotionMode')
            };

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(signupData)
                });

                if (response.ok) {
                    showSuccess('회원가입이 완료되었습니다. 로그인해주세요.');
                    setTimeout(() => {
                        document.getElementById('signupForm').classList.add('hidden');
                        document.getElementById('loginForm').classList.remove('hidden');
                        clearErrors();
                    }, 2000);
                } else {
                    const error = await response.json();
                    showError('signupEmail', error.message || '회원가입에 실패했습니다.');
                }
            } catch (error) {
                showError('signupEmail', '서버 연결에 실패했습니다.');
            }
        });

        document.getElementById('signupEmail').addEventListener('blur', function() {
            const email = this.value;
            if (email && !email.includes('@')) {
                showError('signupEmail', '올바른 이메일 형식이 아닙니다.');
            }
        });

        document.getElementById('signupPassword').addEventListener('input', function() {
            const password = this.value;
            if (password.length > 0 && password.length < 6) {
                showError('signupPassword', '비밀번호는 6자 이상이어야 합니다.');
            } else {
                document.getElementById('signupPasswordError').style.display = 'none';
            }
        });
    </script>
</body>
</html>
