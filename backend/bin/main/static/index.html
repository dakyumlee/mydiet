<!DOCTYPE html>
<html>
<head>
    <title>MyDiet - 새로운 UI</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 500px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px;
            cursor: pointer;
        }
        #result {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎯 MyDiet - 새로운 UI</h1>
        <p>축하합니다! 새로운 애플리케이션이 성공적으로 실행되었습니다!</p>
        
        <button onclick="testAPI()">API 테스트</button>
        <button onclick="testHealth()">DB 연결 테스트</button>
        <button onclick="testUsers()">사용자 목록</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('/');
                const text = await response.text();
                document.getElementById('result').innerHTML = `<h3>기본 API:</h3><p>${text}</p>`;
            } catch (e) {
                document.getElementById('result').innerHTML = `<h3>오류:</h3><p>${e.message}</p>`;
            }
        }

        async function testHealth() {
            try {
                const response = await fetch('/api/health');
                const text = await response.text();
                document.getElementById('result').innerHTML = `<h3>DB 상태:</h3><p>${text}</p>`;
            } catch (e) {
                document.getElementById('result').innerHTML = `<h3>오류:</h3><p>${e.message}</p>`;
            }
        }

        async function testUsers() {
            try {
                const response = await fetch('/api/users');
                const json = await response.json();
                document.getElementById('result').innerHTML = `<h3>사용자 목록:</h3><pre>${JSON.stringify(json, null, 2)}</pre>`;
            } catch (e) {
                document.getElementById('result').innerHTML = `<h3>오류:</h3><p>${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
