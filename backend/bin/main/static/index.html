<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .login-container {
            background: #f8f9fa;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: #667eea;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: block;
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .logo-subtitle {
            color: #666;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            background: #e9ecef;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .welcome-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 16px;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
            color: #999;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #dee2e6;
            z-index: 1;
        }

        .divider span {
            background: #f8f9fa;
            padding: 0 16px;
            position: relative;
            z-index: 2;
        }

        .admin-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #dee2e6;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .logo-icon {
                font-size: 50px;
            }

            .logo-text {
                font-size: 24px;
            }

            .welcome-text {
                font-size: 20px;
            }

            .form-group input, .form-group select {
                padding: 14px;
                font-size: 16px;
            }

            .btn {
                padding: 14px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #0d1117;
                color: #f0f6fc;
            }

            .login-container {
                background: #21262d;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            }

            .logo-text {
                color: #f0f6fc;
            }

            .welcome-text {
                color: #f0f6fc;
            }

            .form-group label {
                color: #f0f6fc;
            }

            .form-group input, .form-group select {
                background: #30363d;
                border-color: #21262d;
                color: #f0f6fc;
            }

            .form-group input:focus, .form-group select:focus {
                background: #30363d;
                border-color: #667eea;
            }

            .auth-tabs {
                background: #30363d;
            }

            .tab {
                color: #8b949e;
            }

            .tab.active {
                background: #21262d;
                color: #f0f6fc;
            }

            .btn-secondary {
                background: #30363d;
                border-color: #21262d;
                color: #f0f6fc;
            }

            .btn-secondary:hover {
                background: #30363d;
            }

            .divider::before {
                background: #30363d;
            }

            .divider span {
                background: #21262d;
            }

            .admin-section {
                border-top-color: #30363d;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">🍎</span>
            <div class="logo-text">MyDiet</div>
            <div class="logo-subtitle">AI와 함께하는 건강한 변화</div>
        </div>

        <div class="auth-tabs">
            <button class="tab active" onclick="showTab('login')">로그인</button>
            <button class="tab" onclick="showTab('signup')">회원가입</button>
        </div>

        <div id="login-section" class="form-section active">
            <h2 class="welcome-text">다시 만나서 반가워요! 👋</h2>
            <p class="welcome-subtitle">건강한 하루를 시작해볼까요?</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn btn-primary">🚀 시작하기</button>
            </form>

            <div class="admin-section">
                <button class="btn btn-secondary" onclick="showAdminLogin()">👑 관리자 로그인</button>
            </div>
        </div>

        <div id="signup-section" class="form-section">
            <h2 class="welcome-text">새로운 시작! 🌟</h2>
            <p class="welcome-subtitle">나만의 AI 다이어트 코치를 만나보세요</p>

            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>닉네임</label>
                    <input type="text" placeholder="멋진 닉네임을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" placeholder="8자 이상 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>목표 체중 (kg)</label>
                    <input type="number" value="60" min="30" max="200" required>
                </div>
                <div class="form-group">
                    <label>AI 코치 성격</label>
                    <select required>
                        <option value="">선택해주세요</option>
                        <option value="무자비">🔥 무자비 - "이것도 못해? 더 해!"</option>
                        <option value="츤데레">😤 츤데레 - "별로지만... 잘했네"</option>
                        <option value="다정함">💕 다정함 - "정말 잘하고 있어요!"</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">🎉 가입하기</button>
            </form>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            const btn = event.target.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '로그인 중...';
            btn.disabled = true;

            setTimeout(() => {
                alert('로그인 성공! 대시보드로 이동합니다.');
                btn.textContent = originalText;
                btn.disabled = false;
            }, 1500);
        }

        function handleSignup(event) {
            event.preventDefault();
            const btn = event.target.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '가입 중...';
            btn.disabled = true;

            setTimeout(() => {
                alert('회원가입 완료! 로그인해주세요.');
                showTab('login');
                btn.textContent = originalText;
                btn.disabled = false;
            }, 2000);
        }

        function showAdminLogin() {
            const password = prompt('관리자 비밀번호를 입력하세요:');
            if (password === 'oicrcutie1998') {
                alert('관리자 로그인 성공!');
            } else if (password) {
                alert('비밀번호가 틀렸습니다.');
            }
        }
    </script>
</body>
</html>
