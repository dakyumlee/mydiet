<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 로그인</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-form {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: white; text-align: center; margin-bottom: 2rem; font-size: 3rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div>
        <h1>🍽️ MyDiet</h1>
        <div class="login-form">
            <h2>로그인</h2>
            <input type="email" id="email" placeholder="이메일" required>
            <input type="password" id="password" placeholder="비밀번호" required>
            <button onclick="login()">로그인</button>
            <p style="text-align: center; margin-top: 1rem;">
                <a href="/register.html">회원가입</a>
            </p>
        </div>
    </div>
    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email === 'admin@mydiet.com' && password === 'admin123') {
                alert('관리자 로그인 성공!');
                window.location.href = '/dashboard.html';
            } else if (email === 'test@mydiet.com' && password === 'test123') {
                alert('사용자 로그인 성공!');
                window.location.href = '/dashboard.html';
            } else {
                alert('로그인 실패!');
            }
        }
    </script>
</body>
</html>
