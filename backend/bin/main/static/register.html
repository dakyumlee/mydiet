<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 회원가입</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🍽️ MyDiet</h1>
            <h2>회원가입</h2>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="nickname" name="nickname" placeholder="닉네임" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="이메일" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="비밀번호" required>
                </div>
                <div class="form-group">
                    <input type="number" id="startWeight" name="startWeight" 
                           placeholder="시작 체중 (kg)" step="0.1" required>
                </div>
                <div class="form-group">
                    <input type="number" id="weightGoal" name="weightGoal" 
                           placeholder="목표 체중 (kg)" step="0.1" required>
                </div>
                <div class="form-group">
                    <select id="emotionMode" name="emotionMode" required>
                        <option value="">감정 모드 선택</option>
                        <option value="무자비">🔥 무자비 (강한 동기부여)</option>
                        <option value="츤데레">😤 츤데레 (까칠하지만 따뜻)</option>
                        <option value="다정함">😊 다정함 (친근하고 부드러운)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">회원가입</button>
            </form>
            
            <div class="auth-links">
                <p>이미 계정이 있으신가요? <a href="/login.html">로그인</a></p>
            </div>
        </div>
    </div>
    
    <div id="loading" class="loading hidden">로딩 중...</div>
    <div id="message" class="message hidden"></div>
    
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                nickname: document.getElementById('nickname').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                startWeight: parseFloat(document.getElementById('startWeight').value),
                weightGoal: parseFloat(document.getElementById('weightGoal').value),
                emotionMode: document.getElementById('emotionMode').value
            };
            
            showLoading(true);
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (data.success) {
                    showMessage('회원가입이 완료되었습니다! 로그인해주세요.', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('회원가입 중 오류가 발생했습니다.', 'error');
            } finally {
                showLoading(false);
            }
        });
    </script>
</body>
</html>
