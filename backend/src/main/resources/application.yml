spring:
  application:
    name: mydiet
  
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: mydiet_user
    password: mydiet_password
    driver-class-name: oracle.jdbc.OracleDriver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # dialect 제거 - 자동 감지하도록 함

  # 초기 데이터 스크립트 비활성화
  sql:
    init:
      mode: never

server:
  port: 8080

logging:
  level:
    com.mydiet: INFO
    org.hibernate.SQL: DEBUG
