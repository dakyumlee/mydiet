spring:
  datasource:
    url: jdbc:h2:mem:mydiet
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080

claude:
  api:
    key: demo-key

logging:
  level:
    com.mydiet: DEBUG