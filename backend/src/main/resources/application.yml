spring:
  application:
    name: mydiet
  
  # H2 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:mydiet;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  # Security 설정
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}

# 서버 설정
server:
  port: 8080

# 로깅 설정
logging:
  level:
    org.springframework.security: DEBUG
    com.mydiet: DEBUG