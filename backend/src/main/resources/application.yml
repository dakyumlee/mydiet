spring:
  application:
    name: mydiet
  
  # 데이터베이스 설정 (H2 - 개발용)
  datasource:
    url: jdbc:h2:mem:mydiet
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  # 정적 리소스 설정
  resources:
    static-locations: classpath:/static/
  
  # 세션 설정
  session:
    store-type: none
    timeout: 3600

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}

# 서버 설정
server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 60m

# 로깅 설정
logging:
  level:
    org.springframework.security: DEBUG
    com: DEBUG

---
# 프로덕션 환경
spring:
  profiles: prod
  
  # PostgreSQL 설정 (Heroku)
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  h2:
    console:
      enabled: false

logging:
  level:
    org.springframework.security: WARN
    com: INFO