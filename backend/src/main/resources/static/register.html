<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 회원가입</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-form {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            max-width: 450px;
            width: 100%;
        }
        h1 { color: white; text-align: center; margin-bottom: 2rem; font-size: 3rem; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div>
        <h1>🍽️ MyDiet</h1>
        <div class="register-form">
            <h2>회원가입</h2>
            <input type="text" id="nickname" placeholder="닉네임" required>
            <input type="email" id="email" placeholder="이메일" required>
            <input type="password" id="password" placeholder="비밀번호" required>
            <input type="number" id="startWeight" placeholder="현재 체중 (kg)" step="0.1" required>
            <input type="number" id="weightGoal" placeholder="목표 체중 (kg)" step="0.1" required>
            <select id="emotionMode" required>
                <option value="">AI 코칭 모드 선택</option>
                <option value="무자비">🔥 무자비</option>
                <option value="츤데레">😤 츤데레</option>
                <option value="다정함">😊 다정함</option>
            </select>
            <button onclick="register()">회원가입</button>
            <p style="text-align: center; margin-top: 1rem;">
                <a href="/">로그인으로 돌아가기</a>
            </p>
        </div>
    </div>
    <script>
        function register() {
            alert('회원가입 완료! 로그인 페이지로 이동합니다.');
            window.location.href = '/';
        }
    </script>
</body>
</html>
