<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - AI 다이어트 코치</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #8b5cf6;
            --secondary: #f43f5e;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            max-width: 1200px;
            width: 95%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .brand-section {
            color: white;
            text-align: center;
        }

        .brand-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .brand-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .brand-subtitle {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .feature-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .auth-section {
            background: var(--surface);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .auth-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            background: var(--background);
            border-radius: 1rem;
            padding: 0.5rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem 1rem;
            text-align: center;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .auth-tab.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .auth-tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            background: var(--surface);
            cursor: pointer;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--text-secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--text-primary);
            transform: translateY(-2px);
        }

        .btn-admin {
            background: var(--error);
            color: white;
            margin-top: 1rem;
        }

        .btn-admin:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--text-secondary);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.875rem;
        }

        .message {
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 968px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                max-width: 500px;
            }

            .brand-section {
                order: 2;
            }

            .auth-section {
                order: 1;
                padding: 2rem;
            }

            .brand-title {
                font-size: 2.5rem;
            }

            .brand-subtitle {
                font-size: 1.1rem;
            }

            .brand-features {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1.5rem;
            }

            .feature-item {
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .auth-section {
                padding: 1.5rem;
            }

            .brand-title {
                font-size: 2rem;
            }

            .form-title {
                font-size: 1.5rem;
            }

            .auth-tabs {
                flex-direction: column;
                gap: 0.5rem;
            }

            .auth-tab {
                padding: 1rem;
            }
        }

        .hidden { display: none !important; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="brand-section">
            <div class="brand-logo">
                <i class="fas fa-apple-alt"></i>
            </div>
            <h1 class="brand-title">MyDiet</h1>
            <p class="brand-subtitle">
                AI와 함께하는 스마트한 다이어트<br>
                건강한 변화, 지금 시작하세요
            </p>
            
            <div class="brand-features">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span>AI 맞춤 조언</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <span>진행상황 추적</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-heart"></i>
                    </div>
                    <span>감정 케어</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                    <span>모바일 최적화</span>
                </div>
            </div>
        </div>

        <div class="auth-section">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </div>
                <div class="auth-tab" onclick="switchTab('signup')">
                    <i class="fas fa-user-plus"></i> 회원가입
                </div>
            </div>

            <div id="message-container"></div>

            <div id="login-form" class="auth-form active">
                <h2 class="form-title">환영합니다! 👋</h2>
                <p class="form-subtitle">계정에 로그인하여 건강한 여정을 계속하세요</p>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">이메일</label>
                        <input type="email" class="form-input" id="login-email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input type="password" class="form-input" id="login-password" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> 로그인
                    </button>
                </form>

                <div class="divider">
                    <span>또는</span>
                </div>

                <button onclick="showAdminLogin()" class="btn btn-admin">
                    <i class="fas fa-shield-alt"></i> 관리자 로그인
                </button>
            </div>

            <div id="signup-form" class="auth-form">
                <h2 class="form-title">회원가입 🌟</h2>
                <p class="form-subtitle">새로운 건강한 습관을 시작해보세요</p>
                
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">닉네임</label>
                        <input type="text" class="form-input" id="signup-nickname" placeholder="사용할 닉네임" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">이메일</label>
                        <input type="email" class="form-input" id="signup-email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input type="password" class="form-input" id="signup-password" placeholder="8자 이상의 비밀번호" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">목표 체중 (kg)</label>
                        <input type="number" class="form-input" id="signup-weight" placeholder="60" step="0.1" min="30" max="200">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">AI 코치 스타일</label>
                        <select class="form-select" id="signup-emotion-mode" required>
                            <option value="">스타일을 선택하세요</option>
                            <option value="다정함">🤗 다정하고 따뜻하게</option>
                            <option value="동기부여">💪 강한 동기부여</option>
                            <option value="츤데레">😤 츤데레 스타일</option>
                            <option value="무자비">😈 무자비하게 엄격하게</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="signup-btn">
                        <i class="fas fa-user-plus"></i> 회원가입
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 2.5rem; border-radius: 1.5rem; max-width: 400px; width: 90%; text-align: center;">
            <h3 style="margin-bottom: 0.5rem; font-size: 1.5rem;">🛡️ 관리자 로그인</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">관리자 전용 비밀번호를 입력하세요</p>
            
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="관리자 비밀번호" class="form-input">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button onclick="hideAdminLogin()" class="btn btn-secondary" style="flex: 1;">
                    취소
                </button>
                <button onclick="checkAdminPassword()" class="btn btn-primary" style="flex: 1;">
                    로그인
                </button>
            </div>
            
            <div id="admin-error" class="message error hidden" style="margin-top: 1rem;">
                비밀번호가 올바르지 않습니다.
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
            });
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-form').classList.add('active');
            
            clearMessages();
        }

        function showMessage(message, type = 'error') {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}"><i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}"></i> ${message}</div>`;
        }

        function clearMessages() {
            document.getElementById('message-container').innerHTML = '';
        }

        async function loginUser(email, password) {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ email, password })
            });
          
            const data = await res.json();
          
            if (data.success) {
              alert("로그인 성공!");
              localStorage.setItem("user", JSON.stringify(data.user));
              location.href = "/dashboard.html";
            } else {
              alert("로그인 실패: " + data.message);
            }
          }
          
        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('login-btn');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<div class="spinner"></div> 로그인 중...';
                btn.disabled = true;
                
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('로그인 성공! 대시보드로 이동합니다...', 'success');
                    
                    sessionStorage.setItem('user', JSON.stringify(data));
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    throw new Error(data.message || '로그인에 실패했습니다.');
                }
                
            } catch (error) {
                console.error('로그인 오류:', error);
                showMessage(error.message || '서버 연결에 실패했습니다.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            const btn = document.getElementById('signup-btn');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<div class="spinner"></div> 가입 중...';
                btn.disabled = true;
                
                const formData = {
                    nickname: document.getElementById('signup-nickname').value,
                    email: document.getElementById('signup-email').value,
                    password: document.getElementById('signup-password').value,
                    weightGoal: parseFloat(document.getElementById('signup-weight').value) || null,
                    emotionMode: document.getElementById('signup-emotion-mode').value
                };
                
                if (formData.password.length < 8) {
                    throw new Error('비밀번호는 8자 이상이어야 합니다.');
                }
                
                if (!formData.emotionMode) {
                    throw new Error('AI 코치 스타일을 선택해주세요.');
                }
                
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('회원가입 성공! 로그인 페이지로 이동합니다...', 'success');
                    
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = formData.email;
                        document.getElementById('login-email').focus();
                    }, 1500);
                } else {
                    throw new Error(data.message || '회원가입에 실패했습니다.');
                }
                
            } catch (error) {
                console.error('회원가입 오류:', error);
                showMessage(error.message || '서버 연결에 실패했습니다.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showAdminLogin() {
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-password').focus();
            document.getElementById('admin-error').classList.add('hidden');
        }

        function hideAdminLogin() {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-error').classList.add('hidden');
        }

        function checkAdminPassword() {
            const password = document.getElementById('admin-password').value;
            
            if (password === 'oicrcutie1998') {
                hideAdminLogin();
                showMessage('관리자 로그인 성공! 관리자 페이지로 이동합니다...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/admin.html';
                }, 1500);
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            }
        }

 
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('admin-modal').classList.contains('hidden')) {
                    checkAdminPassword();
                }
            }
        });
 
        document.addEventListener('DOMContentLoaded', function() {
            const user = sessionStorage.getItem('user');
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    if (userData.id) {
                        window.location.href = '/dashboard.html';
                        return;
                    }
                } catch (e) {
                    sessionStorage.removeItem('user');
                }
            }
             
            document.getElementById('login-email').focus();
        });
    </script>
</body>
</html>
