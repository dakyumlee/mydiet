<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 대시보드</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h1>🍽️ MyDiet</h1>
            <div class="user-info">
                <span id="userNickname">-</span>
                <span id="dietDays" class="diet-days">-</span>
                <button id="logoutBtn" class="btn-logout">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3>📊 오늘의 체중</h3>
                <div class="weight-display">
                    <div class="current-weight">
                        <span class="weight-value" id="currentWeight">-</span>
                        <span class="weight-unit">kg</span>
                    </div>
                    <div class="weight-goal">목표: <span id="weightGoal">-</span>kg</div>
                    <div class="weight-diff" id="weightDiff"></div>
                </div>
                
                <form id="weightForm" class="input-form">
                    <input type="number" id="weightInput" placeholder="체중 (kg)" 
                           step="0.1" min="30" max="300" required>
                    <input type="text" id="weightNote" placeholder="메모 (선택)">
                    <button type="submit" class="btn-submit">기록하기</button>
                </form>
                
                <div id="todayWeights" class="today-records">
                    <h4>오늘의 체중 기록</h4>
                    <div class="records-list"></div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>🥗 오늘의 식단</h3>
                <form id="mealForm" class="input-form">
                    <input type="text" id="mealDescription" placeholder="먹은 음식" required>
                    <input type="number" id="mealCalories" placeholder="예상 칼로리" min="0">
                    <button type="submit" class="btn-submit">기록하기</button>
                </form>
                
                <div id="todayMeals" class="today-records">
                    <h4>오늘의 식단</h4>
                    <div class="records-list"></div>
                    <div class="calorie-summary">
                        총 칼로리: <span id="totalCalories">0</span> kcal
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>😊 오늘의 감정</h3>
                <form id="emotionForm" class="input-form">
                    <select id="emotionMood" required>
                        <option value="">감정 선택</option>
                        <option value="행복">😊 행복</option>
                        <option value="우울">😢 우울</option>
                        <option value="스트레스">😫 스트레스</option>
                        <option value="분노">😠 분노</option>
                        <option value="평온">😌 평온</option>
                        <option value="불안">😰 불안</option>
                        <option value="만족">😌 만족</option>
                        <option value="피곤">😴 피곤</option>
                    </select>
                    <input type="text" id="emotionNote" placeholder="상세 내용" required>
                    <button type="submit" class="btn-submit">기록하기</button>
                </form>
                
                <div id="todayEmotions" class="today-records">
                    <h4>오늘의 감정</h4>
                    <div class="records-list"></div>
                </div>
            </div>

            <div class="dashboard-card diary-card">
                <h3>📝 오늘의 일지</h3>
                <form id="diaryForm" class="input-form">
                    <input type="text" id="diaryTitle" placeholder="제목" required>
                    <textarea id="diaryContent" placeholder="오늘 하루 어떠셨나요?" 
                              rows="4" required></textarea>
                    <button type="submit" class="btn-submit">저장하기</button>
                </form>
                
                <div id="todayDiary" class="diary-display">
                    <h4>오늘의 일지</h4>
                    <div class="diary-content-display"></div>
                </div>
            </div>

            <div class="dashboard-card claude-card">
                <h3>🤖 Claude의 한마디</h3>
                <div id="claudeResponse" class="claude-response">
                    <button id="getClaudeMessage" class="btn-claude">
                        Claude에게 피드백 받기
                    </button>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>🏃 오늘의 운동</h3>
                <form id="workoutForm" class="input-form">
                    <select id="workoutType" required>
                        <option value="">운동 종류</option>
                        <option value="걷기">🚶 걷기</option>
                        <option value="뛰기">🏃 뛰기</option>
                        <option value="자전거">🚴 자전거</option>
                        <option value="수영">🏊 수영</option>
                        <option value="헬스">💪 헬스</option>
                        <option value="요가">🧘 요가</option>
                        <option value="기타">📝 기타</option>
                    </select>
                    <input type="number" id="workoutDuration" placeholder="운동 시간 (분)" 
                           min="1" required>
                    <input type="number" id="workoutCalories" placeholder="소모 칼로리" min="0">
                    <button type="submit" class="btn-submit">기록하기</button>
                </form>
                
                <div id="todayWorkouts" class="today-records">
                    <h4>오늘의 운동</h4>
                    <div class="records-list"></div>
                    <div class="calorie-summary">
                        소모 칼로리: <span id="totalBurnedCalories">0</span> kcal
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loading" class="loading hidden">로딩 중...</div>
    <div id="message" class="message hidden"></div>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
