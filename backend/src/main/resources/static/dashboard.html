<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #8b5cf6;
            --secondary: #f43f5e;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
        }
 
        .header {
            background: var(--surface);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .logout-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }
 
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
 
        .claude-section {
            margin-bottom: 3rem;
        }

        .claude-card {
            background: var(--primary);
            color: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .claude-avatar {
            width: 4rem;
            height: 4rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
        }

        .claude-message {
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 2rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .claude-loading {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.1rem;
        }

        .spinner {
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .claude-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--surface);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-outline {
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .quick-actions {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .action-card {
            background: var(--surface);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }

        .action-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .action-icon {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.3rem;
            color: white;
        }

        .action-card:nth-child(1) .action-icon { background: var(--success); }
        .action-card:nth-child(2) .action-icon { background: var(--accent); }
        .action-card:nth-child(3) .action-icon { background: var(--warning); }
        .action-card:nth-child(4) .action-icon { background: var(--secondary); }

        .action-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .action-desc {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .action-btn:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .progress-section {
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .progress-item {
            text-align: center;
        }

        .progress-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .progress-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }

            .user-info {
                gap: 0.5rem;
            }

            .user-name {
                display: none;
            }

            .welcome-title {
                font-size: 2rem;
            }

            .claude-card {
                padding: 2rem 1.5rem;
            }

            .claude-message {
                font-size: 1.1rem;
            }

            .claude-actions {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                min-width: 200px;
                justify-content: center;
            }

            .actions-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .action-card {
                padding: 1.5rem;
            }

            .progress-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }

            .main {
                padding: 1.5rem 1rem;
            }
        }

        @media (max-width: 480px) {
            .welcome-title {
                font-size: 1.8rem;
            }

            .claude-card {
                padding: 1.5rem 1rem;
            }

            .claude-message {
                font-size: 1rem;
            }

            .progress-grid {
                grid-template-columns: 1fr;
            }

            .progress-value {
                font-size: 2rem;
            }
        }

        .hidden { display: none; }

        .message {
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-apple-alt"></i> MyDiet
            </div>
            <div class="user-info">
                <span class="user-name" id="user-name">사용자</span>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="welcome-section">
            <h1 class="welcome-title">안녕하세요, <span id="welcome-name">님</span>! 👋</h1>
            <p class="welcome-subtitle">오늘도 건강한 하루를 만들어가요</p>
        </section>
 
        <section class="claude-section">
            <div class="claude-card">
                <div class="claude-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div id="claude-message" class="claude-message">
                    <div class="claude-loading">
                        <div class="spinner"></div>
                        Claude가 당신을 위한 특별한 조언을 준비하고 있어요...
                    </div>
                </div>
                <div class="claude-actions">
                    <button onclick="refreshClaudeMessage()" class="btn btn-primary">
                        <i class="fas fa-sync-alt"></i> 새로운 조언
                    </button>
                    <button onclick="askClaudeCustom()" class="btn btn-outline">
                        <i class="fas fa-comment"></i> 질문하기
                    </button>
                </div>
            </div>
        </section>
 
        <section class="progress-section">
            <h2 class="section-title">오늘의 진행상황</h2>
            <div class="progress-grid">
                <div class="progress-item">
                    <div class="progress-value" id="meal-count">0</div>
                    <div class="progress-label">식사 기록</div>
                </div>
                <div class="progress-item">
                    <div class="progress-value" id="workout-time">0</div>
                    <div class="progress-label">운동 시간 (분)</div>
                </div>
                <div class="progress-item">
                    <div class="progress-value" id="emotion-count">0</div>
                    <div class="progress-label">감정 기록</div>
                </div>
                <div class="progress-item">
                    <div class="progress-value" id="claude-count">0</div>
                    <div class="progress-label">AI 조언</div>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <h2 class="section-title">빠른 기록</h2>
            <div class="actions-grid">
                <div class="action-card">
                    <div class="action-icon">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <div class="action-title">식단 기록</div>
                    <div class="action-desc">오늘 먹은 음식을 기록하고 칼로리를 추적하세요</div>
                    <button class="action-btn" onclick="recordMeal()">
                        <i class="fas fa-plus"></i> 식단 추가
                    </button>
                </div>

                <div class="action-card">
                    <div class="action-icon">
                        <i class="fas fa-dumbbell"></i>
                    </div>
                    <div class="action-title">운동 기록</div>
                    <div class="action-desc">운동 활동을 기록하고 소모 칼로리를 확인하세요</div>
                    <button class="action-btn" onclick="recordWorkout()">
                        <i class="fas fa-plus"></i> 운동 추가
                    </button>
                </div>

                <div class="action-card">
                    <div class="action-icon">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="action-title">감정 일기</div>
                    <div class="action-desc">오늘의 기분과 감정을 기록해보세요</div>
                    <button class="action-btn" onclick="recordEmotion()">
                        <i class="fas fa-plus"></i> 감정 기록
                    </button>
                </div>

                <div class="action-card">
                    <div class="action-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="action-title">진행 분석</div>
                    <div class="action-desc">지금까지의 진행상황을 자세히 분석해보세요</div>
                    <button class="action-btn" onclick="viewAnalytics()">
                        <i class="fas fa-chart-bar"></i> 분석 보기
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            const userData = sessionStorage.getItem('user');
            
            if (!userData) {
                window.location.href = '/';
                return;
            }
            
            try {
                currentUser = JSON.parse(userData);
                initializeDashboard();
            } catch (error) {
                console.error('사용자 데이터 파싱 오류:', error);
                logout();
            }
        });

        function initializeDashboard() {
            document.getElementById('user-name').textContent = currentUser.nickname || '사용자';
            document.getElementById('welcome-name').textContent = currentUser.nickname || '사용자';
             
            loadClaudeMessage();
             
            loadTodayProgress();
        }
 
        async function loadClaudeMessage() {
            try {
                const response = await fetch(`/api/claude/message?userId=${currentUser.id || 1}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const message = await response.text();
                document.getElementById('claude-message').innerHTML = message;
            } catch (error) {
                console.error('Claude API 오류:', error);
                document.getElementById('claude-message').innerHTML = 
                    `<div style="color: rgba(255,255,255,0.8);">
                        <i class="fas fa-exclamation-triangle"></i> 
                        Claude 서비스에 일시적인 문제가 있습니다.<br>
                        <small>잠시 후 다시 시도해주세요.</small>
                    </div>`;
            }
        }
 
        function refreshClaudeMessage() {
            document.getElementById('claude-message').innerHTML = 
                `<div class="claude-loading">
                    <div class="spinner"></div>
                    Claude가 새로운 조언을 생각하고 있어요...
                </div>`;
            loadClaudeMessage();
        }
 
        function askClaudeCustom() {
            const question = prompt('Claude에게 무엇을 물어보고 싶나요?');
            if (question && question.trim()) {
                askCustomQuestion(question.trim());
            }
        }

        async function askCustomQuestion(question) {
            document.getElementById('claude-message').innerHTML = 
                `<div class="claude-loading">
                    <div class="spinner"></div>
                    Claude가 당신의 질문에 답하고 있어요...
                </div>`;

            try {
                const response = await fetch('/api/claude/test', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: question
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const answer = await response.text();
                document.getElementById('claude-message').innerHTML = answer;
            } catch (error) {
                console.error('Claude 질문 오류:', error);
                document.getElementById('claude-message').innerHTML = 
                    `<div style="color: rgba(255,255,255,0.8);">
                        <i class="fas fa-exclamation-triangle"></i> 
                        질문 처리 중 오류가 발생했습니다.<br>
                        <small>${error.message}</small>
                    </div>`;
            }
        }
 
        async function loadTodayProgress() {
            try { 
                document.getElementById('meal-count').textContent = Math.floor(Math.random() * 5);
                document.getElementById('workout-time').textContent = Math.floor(Math.random() * 60);
                document.getElementById('emotion-count').textContent = Math.floor(Math.random() * 3);
                document.getElementById('claude-count').textContent = Math.floor(Math.random() * 10) + 1;
            } catch (error) {
                console.error('진행상황 로드 실패:', error);
            }
        }
 
        function recordMeal() {
            alert('식단 기록 기능은 개발 중입니다! 🍽️');
        }

        function recordWorkout() {
            alert('운동 기록 기능은 개발 중입니다! 💪');
        }

        function recordEmotion() {
            alert('감정 기록 기능은 개발 중입니다! 😊');
        }

        function viewAnalytics() {
            alert('분석 기능은 개발 중입니다! 📊');
        }
 
        function logout() {
            sessionStorage.removeItem('user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
