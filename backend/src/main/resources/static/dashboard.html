<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 대시보드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card h3 { color: #667eea; margin-bottom: 1rem; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍽️ MyDiet 대시보드</h1>
        <button onclick="logout()" style="background: rgba(255,255,255,0.2); padding: 8px 16px;">로그아웃</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📊 체중 관리</h3>
            <p>현재: <strong>78.5kg</strong> / 목표: 70.0kg</p>
            <input type="number" placeholder="오늘 체중 (kg)" step="0.1">
            <button onclick="alert('체중 기록 완료!')">기록하기</button>
        </div>

        <div class="card">
            <h3>🥗 식단 기록</h3>
            <input type="text" placeholder="먹은 음식">
            <input type="number" placeholder="칼로리">
            <button onclick="alert('식단 기록 완료!')">기록하기</button>
        </div>

        <div class="card">
            <h3>😊 감정 기록</h3>
            <select>
                <option>감정 선택</option>
                <option>😊 행복</option>
                <option>😢 우울</option>
                <option>😫 스트레스</option>
            </select>
            <input type="text" placeholder="상세 내용">
            <button onclick="alert('감정 기록 완료!')">기록하기</button>
        </div>

        <div class="card">
            <h3>📝 일지</h3>
            <input type="text" placeholder="제목">
            <textarea placeholder="내용" rows="3"></textarea>
            <button onclick="alert('일지 저장 완료!')">저장하기</button>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
