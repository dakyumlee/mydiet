<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 다이어트 일지</title>
    <link rel="stylesheet" href="/css/diary.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h1>📝 다이어트 일지</h1>
            <nav class="nav-links">
                <a href="/dashboard.html">대시보드</a>
                <a href="/meal-log.html">식단 기록</a>
                <a href="/weight-log.html">체중 기록</a>
                <a href="/emotion-log.html">감정 기록</a>
                <button id="logoutBtn" class="btn-logout">로그아웃</button>
            </nav>
        </div>
    </header>

    <main class="diary-main">
        <div class="diary-container">
            <section class="diary-input-section">
                <h2 id="diaryDateTitle">오늘의 일지</h2>
                <form id="diaryForm" class="diary-form">
                    <div class="form-group">
                        <label for="diaryTitle">제목</label>
                        <input type="text" id="diaryTitle" placeholder="오늘의 일지 제목을 입력하세요" required>
                    </div>
                    
                    <div class="diary-prompts">
                        <h4>오늘은 어땠나요? (선택해서 자동 입력)</h4>
                        <div class="prompt-buttons">
                            <button type="button" class="prompt-btn" data-prompt="오늘 다이어트는 어땠나요?">🍎 다이어트</button>
                            <button type="button" class="prompt-btn" data-prompt="오늘 운동은 어떻게 하셨나요?">🏃 운동</button>
                            <button type="button" class="prompt-btn" data-prompt="오늘 기분은 어땠나요?">😊 기분</button>
                            <button type="button" class="prompt-btn" data-prompt="오늘 먹은 음식에 대해 어떻게 생각하시나요?">🥗 음식</button>
                            <button type="button" class="prompt-btn" data-prompt="오늘 목표는 달성하셨나요?">🎯 목표</button>
                            <button type="button" class="prompt-btn" data-prompt="내일은 무엇을 계획하고 계시나요?">📅 내일 계획</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="diaryContent">내용</label>
                        <textarea id="diaryContent" placeholder="오늘 하루를 자유롭게 적어보세요..." rows="10" required></textarea>
                        <div class="char-count">
                            <span id="charCount">0</span> / 1000자
                        </div>
                    </div>
                    
                    <div class="diary-mood">
                        <label>오늘의 기분</label>
                        <div class="mood-selector">
                            <label class="mood-option">
                                <input type="radio" name="mood" value="very-good">
                                <span class="mood-emoji">😍</span>
                                <span class="mood-text">최고</span>
                            </label>
                            <label class="mood-option">
                                <input type="radio" name="mood" value="good">
                                <span class="mood-emoji">😊</span>
                                <span class="mood-text">좋음</span>
                            </label>
                            <label class="mood-option">
                                <input type="radio" name="mood" value="normal" checked>
                                <span class="mood-emoji">😐</span>
                                <span class="mood-text">보통</span>
                            </label>
                            <label class="mood-option">
                                <input type="radio" name="mood" value="bad">
                                <span class="mood-emoji">😔</span>
                                <span class="mood-text">나쁨</span>
                            </label>
                            <label class="mood-option">
                                <input type="radio" name="mood" value="very-bad">
                                <span class="mood-emoji">😭</span>
                                <span class="mood-text">최악</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" id="saveDraftBtn" class="btn-secondary">임시저장</button>
                        <button type="submit" class="btn-submit">일지 저장</button>
                    </div>
                </form>
            </section>

            <section class="diary-list-section">
                <div class="section-header">
                    <h2>일지 목록</h2>
                    <div class="diary-filters">
                        <select id="monthFilter">
                            <option value="">전체 기간</option>
                        </select>
                        <input type="text" id="searchDiary" placeholder="제목 또는 내용 검색">
                        <button id="searchBtn" class="btn-search">검색</button>
                    </div>
                </div>
                
                <div id="diaryList" class="diary-list">
                </div>
                
                <div class="pagination">
                    <button id="prevPage" class="btn-page">이전</button>
                    <span id="pageInfo" class="page-info">1 / 1</span>
                    <button id="nextPage" class="btn-page">다음</button>
                </div>
            </section>

            <section class="diary-stats-section">
                <h2>일지 통계</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>총 일지 수</h4>
                        <div class="stat-value" id="totalDiaries">-</div>
                    </div>
                    <div class="stat-card">
                        <h4>이번 달 작성</h4>
                        <div class="stat-value" id="thisMonthDiaries">-</div>
                    </div>
                    <div class="stat-card">
                        <h4>연속 작성</h4>
                        <div class="stat-value" id="consecutiveDays">-일</div>
                    </div>
                    <div class="stat-card">
                        <h4>평균 글자 수</h4>
                        <div class="stat-value" id="avgCharCount">-자</div>
                    </div>
                </div>
                
                <div class="mood-trend">
                    <h4>기분 변화 추이</h4>
                    <canvas id="moodTrendChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <div id="diaryDetailModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalDiaryTitle">일지 제목</h3>
                <div class="modal-actions">
                    <button id="editDiaryBtn" class="btn-edit">수정</button>
                    <button id="deleteDiaryBtn" class="btn-delete">삭제</button>
                    <button class="modal-close">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="diary-meta">
                    <span id="modalDiaryDate" class="diary-date"></span>
                    <span id="modalDiaryMood" class="diary-mood-display"></span>
                </div>
                <div id="modalDiaryContent" class="diary-content-display"></div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading hidden">로딩 중...</div>
    <div id="message" class="message hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/diary.js"></script>
</body>
</html>
