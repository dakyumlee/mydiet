<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 로그인</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🍽️ MyDiet</h1>
            <h2>로그인</h2>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="이메일" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn-primary">로그인</button>
            </form>
            
            <div class="auth-links">
                <p>계정이 없으신가요? <a href="/register.html">회원가입</a></p>
            </div>
            
            <div class="demo-accounts">
                <h3>데모 계정</h3>
                <p>관리자: admin@mydiet.com / admin123</p>
                <p>사용자: test@mydiet.com / test123</p>
            </div>
        </div>
    </div>
    
    <div id="loading" class="loading hidden">로딩 중...</div>
    <div id="message" class="message hidden"></div>
    
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showLoading(true);
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    showMessage('로그인 성공!', 'success');
                    setTimeout(() => {
                        if (data.user.role === 'ADMIN') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/dashboard.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('로그인 중 오류가 발생했습니다.', 'error');
            } finally {
                showLoading(false);
            }
        });
    </script>
</body>
</html>
