<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiet - 회원가입</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .register-form {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 2rem auto;
        }
        .register-form h2 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 1rem;
        }
        .btn-register:hover {
            transform: translateY(-2px);
        }
        .auth-links {
            margin-top: 1rem;
            color: #666;
        }
        .auth-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .emotion-mode-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ MyDiet</h1>
        <p>나만의 다이어트 관리 시스템</p>
        
        <div class="register-form">
            <h2>회원가입</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호 (최소 6자)" minlength="6" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="startWeight">현재 체중 (kg)</label>
                        <input type="number" id="startWeight" placeholder="70.5" step="0.1" min="30" max="300" required>
                    </div>
                    <div class="form-group">
                        <label for="weightGoal">목표 체중 (kg)</label>
                        <input type="number" id="weightGoal" placeholder="65.0" step="0.1" min="30" max="300" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="emotionMode">AI 코칭 모드</label>
                    <select id="emotionMode" required>
                        <option value="">코칭 스타일을 선택하세요</option>
                        <option value="무자비">🔥 무자비 (강한 동기부여, 엄격한 관리)</option>
                        <option value="츤데레">😤 츤데레 (까칠하지만 따뜻한 관심)</option>
                        <option value="다정함">😊 다정함 (친근하고 부드러운 격려)</option>
                    </select>
                    <div class="emotion-mode-desc">
                        AI가 선택한 스타일로 다이어트 코칭을 해드립니다
                    </div>
                </div>
                
                <button type="submit" class="btn-register">회원가입 완료</button>
            </form>
            
            <div class="auth-links">
                <p>이미 계정이 있으신가요? <a href="/">로그인</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nickname: document.getElementById('nickname').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                startWeight: parseFloat(document.getElementById('startWeight').value),
                weightGoal: parseFloat(document.getElementById('weightGoal').value),
                emotionMode: document.getElementById('emotionMode').value
            };
            
            if (formData.startWeight <= 0 || formData.weightGoal <= 0) {
                alert('체중은 0보다 큰 값을 입력해주세요.');
                return;
            }
            
            if (formData.password.length < 6) {
                alert('비밀번호는 최소 6자 이상이어야 합니다.');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('mydiet_users') || '[]');
            
            if (users.find(user => user.email === formData.email)) {
                alert('이미 가입된 이메일입니다.');
                return;
            }
            
            if (users.find(user => user.nickname === formData.nickname)) {
                alert('이미 사용 중인 닉네임입니다.');
                return;
            }
            
            const newUser = {
                ...formData,
                id: Date.now(),
                dietStartDate: new Date().toISOString().split('T')[0], // 오늘 날짜
                role: 'USER',
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('mydiet_users', JSON.stringify(users));
            
            alert('회원가입이 완료되었습니다! 🎉\n로그인 페이지로 이동합니다.');
            window.location.href = '/';
        });
        
        document.getElementById('startWeight').addEventListener('change', function() {
            const startWeight = parseFloat(this.value);
            const goalInput = document.getElementById('weightGoal');
            
            if (startWeight > 0 && !goalInput.value) {
                goalInput.value = (startWeight * 0.9).toFixed(1);
            }
        });
    </script>
</body>
</html>
