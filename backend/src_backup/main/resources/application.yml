spring:
  application:
    name: mydiet
  
  # Oracle Free 23c 설정
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: mydiet_user
    password: mydiet_password
    driver-class-name: oracle.jdbc.OracleDriver
    
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.Oracle23cDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  
  # 초기 데이터
  sql:
    init:
      mode: always
      data-locations: classpath:data-oracle-free.sql
      continue-on-error: false

# 서버 설정
server:
  port: 8080

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}

# 로깅
logging:
  level:
    com.mydiet: INFO
    org.hibernate.SQL: DEBUG
    oracle.jdbc: WARN
