<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mydiet - 로그인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 90%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #5a6fd8;
        }
        
        .toggle {
            text-align: center;
            margin-top: 20px;
        }
        
        .toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .success {
            color: green;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ mydiet</h1>
        
        <div id="loginForm">
            <form id="loginFormElement">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">로그인</button>
            </form>
            <div class="toggle">
                계정이 없으신가요? <a onclick="showSignup()">회원가입</a>
            </div>
        </div>
        
        <div id="signupForm" class="hidden">
            <form id="signupFormElement">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="signupPassword" required>
                </div>
                <div class="form-group">
                    <label>닉네임</label>
                    <input type="text" id="signupNickname" required>
                </div>
                <div class="form-group">
                    <label>목표 체중 (kg)</label>
                    <input type="number" id="signupWeight" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>AI 코칭 스타일</label>
                    <select id="signupEmotion" required>
                        <option value="">선택하세요</option>
                        <option value="무자비">무자비 (강하게 푸쉬)</option>
                        <option value="츤데레">츤데레 (까칠하지만 따뜻한)</option>
                        <option value="다정함">다정함 (부드럽고 격려하는)</option>
                        <option value="유머">유머 (재미있게 동기부여)</option>
                    </select>
                </div>
                <button type="submit">회원가입</button>
            </form>
            <div class="toggle">
                이미 계정이 있으신가요? <a onclick="showLogin()">로그인</a>
            </div>
        </div>
        
        <div id="message" class="error hidden"></div>
    </div>

    <script>
        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('message').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('message').classList.add('hidden');
        }

        function showMessage(text, isError = true) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = isError ? 'error' : 'success';
            messageDiv.classList.remove('hidden');
        }

        document.getElementById('loginFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loginData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('userId', result.userId);
                    localStorage.setItem('userInfo', JSON.stringify(result));
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    showMessage(error.message || '로그인에 실패했습니다.');
                }
            } catch (error) {
                showMessage('서버 연결에 실패했습니다.');
            }
        });

        document.getElementById('signupFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const signupData = {
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value,
                nickname: document.getElementById('signupNickname').value,
                weightGoal: parseFloat(document.getElementById('signupWeight').value),
                emotionMode: document.getElementById('signupEmotion').value
            };

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(signupData)
                });

                if (response.ok) {
                    showMessage('회원가입이 완료되었습니다. 로그인해주세요.', false);
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = signupData.email;
                    }, 2000);
                } else {
                    const error = await response.json();
                    showMessage(error.message || '회원가입에 실패했습니다.');
                }
            } catch (error) {
                showMessage('서버 연결에 실패했습니다.');
            }
        });
    </script>
</body>
</html>
