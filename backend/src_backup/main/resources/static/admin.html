<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-description {
            font-size: 0.9em;
            color: #999;
        }

        /* 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: relative;
        }

        .modal-title {
            font-size: 1.5em;
            margin: 0;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .close:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .data-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .data-table tr:hover {
            background-color: #f5f5f5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .badge-success {
            background-color: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background-color: #fff3cd;
            color: #856404;
        }

        .badge-info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 관리자 대시보드</h1>
            <p>시스템 전체 현황을 관리합니다</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card" onclick="openModal('users')">
                <div class="stat-number" id="totalUsers">-</div>
                <div class="stat-label">총 사용자</div>
                <div class="stat-description">등록된 전체 사용자 수</div>
            </div>

            <div class="stat-card" onclick="openModal('meals')">
                <div class="stat-number" id="totalMeals">-</div>
                <div class="stat-label">식단 기록</div>
                <div class="stat-description">전체 식단 기록 수</div>
            </div>

            <div class="stat-card" onclick="openModal('claude')">
                <div class="stat-number" id="totalClaude">-</div>
                <div class="stat-label">Claude 응답</div>
                <div class="stat-description">AI 응답 총 횟수</div>
            </div>

            <div class="stat-card" onclick="openModal('active')">
                <div class="stat-number" id="activeUsers">-</div>
                <div class="stat-label">활성 사용자</div>
                <div class="stat-description">최근 7일 활동 사용자</div>
            </div>
        </div>
    </div>

    <div id="usersModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">전체 사용자 목록</h2>
                <span class="close" onclick="closeModal('usersModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div id="usersContent" class="loading">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <div id="mealsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">식단 기록 현황</h2>
                <span class="close" onclick="closeModal('mealsModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div id="mealsContent" class="loading">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <div id="claudeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Claude AI 응답 기록</h2>
                <span class="close" onclick="closeModal('claudeModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div id="claudeContent" class="loading">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <div id="activeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">활성 사용자 분석</h2>
                <span class="close" onclick="closeModal('activeModal')">&times;</span>
            </div>
            <div class="modal-body">
                <div id="activeContent" class="loading">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboardStats();
        });

        async function loadDashboardStats() {
            try {
                const response = await fetch('/api/admin/dashboard');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.data.totalUsers || 0;
                    document.getElementById('totalMeals').textContent = data.data.totalMeals || 0;
                    document.getElementById('totalClaude').textContent = data.data.totalClaudeResponses || 0;
                    document.getElementById('activeUsers').textContent = data.data.activeUsers || 0;
                } else {
                    console.error('통계 로드 실패:', data.message);
                }
            } catch (error) {
                console.error('통계 로드 오류:', error);
                document.getElementById('totalUsers').textContent = '0';
                document.getElementById('totalMeals').textContent = '0';
                document.getElementById('totalClaude').textContent = '0';
                document.getElementById('activeUsers').textContent = '0';
            }
        }

        function openModal(type) {
            const modalId = type + 'Modal';
            const modal = document.getElementById(modalId);
            const contentId = type + 'Content';
            
            modal.style.display = 'block';
            loadModalData(type, contentId);
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }

        async function loadModalData(type, contentId) {
            const contentDiv = document.getElementById(contentId);
            contentDiv.innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';

            try {
                let endpoint = '';
                switch(type) {
                    case 'users':
                        endpoint = '/api/admin/users';
                        break;
                    case 'meals':
                        endpoint = '/api/admin/meals';
                        break;
                    case 'claude':
                        endpoint = '/api/admin/claude-responses';
                        break;
                    case 'active':
                        endpoint = '/api/admin/active-users';
                        break;
                }

                const response = await fetch(endpoint);
                const data = await response.json();

                if (data.success) {
                    renderModalContent(type, data.data, contentId);
                } else {
                    contentDiv.innerHTML = `<div class="error">데이터 로드 실패: ${data.message}</div>`;
                }
            } catch (error) {
                contentDiv.innerHTML = `<div class="error">오류가 발생했습니다: ${error.message}</div>`;
            }
        }

        function renderModalContent(type, data, contentId) {
            const contentDiv = document.getElementById(contentId);
            let html = '';

            switch(type) {
                case 'users':
                    html = renderUsersTable(data);
                    break;
                case 'meals':
                    html = renderMealsTable(data);
                    break;
                case 'claude':
                    html = renderClaudeTable(data);
                    break;
                case 'active':
                    html = renderActiveUsersTable(data);
                    break;
            }

            contentDiv.innerHTML = html;
        }

        function renderUsersTable(users) {
            if (!users || users.length === 0) {
                return '<p>등록된 사용자가 없습니다.</p>';
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>닉네임</th>
                            <th>이메일</th>
                            <th>목표체중</th>
                            <th>감정모드</th>
                            <th>가입일</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.nickname || '-'}</td>
                        <td>${user.email}</td>
                        <td>${user.weightGoal ? user.weightGoal + 'kg' : '-'}</td>
                        <td><span class="badge badge-info">${user.emotionMode || '설정안함'}</span></td>
                        <td>${formatDate(user.createdAt)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function renderMealsTable(meals) {
            if (!meals || meals.length === 0) {
                return '<p>식단 기록이 없습니다.</p>';
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>사용자</th>
                            <th>식단 내용</th>
                            <th>칼로리</th>
                            <th>기록일</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            meals.forEach(meal => {
                html += `
                    <tr>
                        <td>${meal.userNickname || meal.userEmail}</td>
                        <td>${meal.description}</td>
                        <td>${meal.caloriesEstimate ? meal.caloriesEstimate + 'kcal' : '-'}</td>
                        <td>${formatDate(meal.date)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function renderClaudeTable(responses) {
            if (!responses || responses.length === 0) {
                return '<p>Claude 응답 기록이 없습니다.</p>';
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>사용자</th>
                            <th>응답 내용</th>
                            <th>타입</th>
                            <th>생성일</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            responses.forEach(response => {
                html += `
                    <tr>
                        <td>${response.userNickname || response.userEmail}</td>
                        <td>${response.content.length > 50 ? response.content.substring(0, 50) + '...' : response.content}</td>
                        <td><span class="badge badge-success">${response.type}</span></td>
                        <td>${formatDateTime(response.createdAt)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function renderActiveUsersTable(activeUsers) {
            if (!activeUsers || activeUsers.length === 0) {
                return '<p>최근 활성 사용자가 없습니다.</p>';
            }

            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>사용자</th>
                            <th>최근 활동</th>
                            <th>활동 유형</th>
                            <th>활동 횟수</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            activeUsers.forEach(user => {
                html += `
                    <tr>
                        <td>${user.nickname || user.email}</td>
                        <td>${formatDate(user.lastActivity)}</td>
                        <td><span class="badge badge-warning">${user.activityType}</span></td>
                        <td>${user.activityCount}회</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('ko-KR');
        }

        function formatDateTime(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('ko-KR');
        }
    </script>
</body>
</html>
